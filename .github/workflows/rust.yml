name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    defaults:
      run:
        working-directory: ./gemini
    env:
      GEMINI_API_KEY: ${{secrets.GEMINI_API_KEY}}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check fmt
      run: cargo fmt --check
    - name: Run tests
      run: cargo test -- --nocapture --skip ask --skip see_web
